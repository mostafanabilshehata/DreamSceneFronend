[build]
  command = "npm run build"
  publish = "dist/dreamScene/browser"

[dev]
  targetPort = 4200
  port = 8888

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"